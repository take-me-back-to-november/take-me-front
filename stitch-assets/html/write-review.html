<!-- Scripts for Interactions -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Star Rating Logic
            const stars = document.querySelectorAll('.star-btn');
            const ratingInput = document.getElementById('rating-value');

            stars.forEach((star, index) => {
                star.addEventListener('click', () => {
                    const value = index + 1;
                    ratingInput.value = value;
                    
                    // Update visual state
                    stars.forEach((s, i) => {
                        if (i < value) {
                            s.classList.remove('text-surface-container-highest');
                            s.classList.add('text-primary');
                        } else {
                            s.classList.remove('text-primary');
                            s.classList.add('text-surface-container-highest');
                        }
                    });
                });

                // Hover effects
                star.addEventListener('mouseenter', () => {
                    stars.forEach((s, i) => {
                        if (i <= index && !s.classList.contains('text-primary')) {
                             s.style.color = '#53e076'; // Primary color
                             s.style.opacity = '0.5';
                        }
                    });
                });

                star.addEventListener('mouseleave', () => {
                    const currentValue = parseInt(ratingInput.value);
                     stars.forEach((s, i) => {
                        s.style.color = '';
                        s.style.opacity = '';
                    });
                });
            });

            // Character Count Logic
            const textarea = document.getElementById('review-text');
            const charCount = document.getElementById('char-count');
            const maxLength = 1000;

            textarea.addEventListener('input', (e) => {
                const currentLength = e.target.value.length;
                if (currentLength > maxLength) {
                    e.target.value = e.target.value.substring(0, maxLength);
                }
                charCount.textContent = Math.min(currentLength, maxLength);
                
                if (currentLength >= maxLength) {
                    charCount.classList.add('text-error');
                } else {
                    charCount.classList.remove('text-error');
                }
            });
        });
    </script>
