<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Take Me - Connect Spotify</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

                extend: {
                    colors: {
                        "surface-tint": "#53e076",
                        "secondary-container": "#4a4949",
                        "secondary-fixed-dim": "#c8c6c5",

                        "on-error": "#690005",

                        "on-tertiary-container": "#373838",
                        "tertiary-container": "#a1a1a1",
                        "background": "#0e150e",
                        "surface": "#0e150e",
                        "secondary": "#c8c6c5",
                        "on-surface-variant": "#bccbb9",
                        "primary": "#53e076",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-primary-container": "#004118",
                        "primary-fixed": "#72fe8f",
                        "on-primary": "#003914",
                        "tertiary": "#c7c6c6",
                        "surface-container-low": "#161d16",
                        "outline": "#869585",
                        "on-tertiary-fixed-variant": "#464747",
                        "on-surface": "#dde5d9",
                        "surface-container-high": "#242c24",
                        "inverse-on-surface": "#2b322a",
                        "inverse-surface": "#dde5d9",
                        "on-background": "#dde5d9",
                        "tertiary-fixed-dim": "#c7c6c6",
                        "surface-container-highest": "#2f372e",
                        "surface-variant": "#2f372e",
                        "on-secondary-fixed-variant": "#474646",
                        "surface-container": "#1a211a",
                        "surface-dim": "#0e150e",
                        "outline-variant": "#3d4a3d",
                        "primary-fixed-dim": "#53e076",
                        "on-secondary": "#313030",
                        "surface-bright": "#333b33",
                        "surface-container-lowest": "#091009",
                        "primary-container": "#1db954",
                        "on-tertiary": "#2f3131",
                        "on-error-container": "#ffdad6",
                        "inverse-primary": "#006e2d",
                        "error-container": "#93000a",

                    },
                    borderRadius: {

                    spacing: {
                        "xs": "4px",

                        "container-margin": "24px",

                        "unit": "4px",
                        "xl": "40px",
                        "sm": "8px",
                        "gutter": "16px"
                    },
                    fontFamily: {
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"],

                        "body-md": ["Hanken Grotesk"]

                    fontSize: {

                }

        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Subtle ambient glow behind the card */
        .ambient-glow {
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            background: radial-gradient(circle, rgba(29, 185, 84, 0.05) 0%, rgba(14, 21, 14, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md antialiased overflow-hidden">
<!-- Top Navigation Anchor (Suppressed nav elements as this is an onboarding/setup screen) -->
<header class="w-full px-container-margin py-md flex justify-between items-center z-10 relative">
<div class="font-display text-headline-lg-mobile text-primary tracking-tighter">
            Take Me
        </div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center justify-center px-container-margin relative z-10">
<!-- Ambient Glow Effect -->
<div class="ambient-glow"></div>
<div class="w-full max-w-md flex flex-col items-center text-center space-y-xl z-10">
<!-- Text Content -->
<div class="space-y-sm">
<h1 class="font-headline-lg md:font-headline-lg text-headline-lg md:text-headline-lg text-on-surface">
                    Connect your music.
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-sm mx-auto">
                    Link your Spotify to search for songs, see your top tracks, and start reviewing.
                </p>
</div>
<!-- Spotify Connection Card -->
<div class="w-full bg-surface-container-high rounded-xl p-lg border border-outline-variant/30 relative overflow-hidden group hover:border-primary/20 transition-colors duration-300">
<!-- Decorative background elements -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container/5 rounded-full blur-2xl -mr-10 -mt-10 transition-opacity group-hover:bg-primary-container/10"></div>
<div class="absolute bottom-0 left-0 w-24 h-24 bg-surface-container-highest rounded-full blur-xl -ml-8 -mb-8"></div>
<div class="relative z-10 flex flex-col items-center space-y-lg">
<!-- Decorative Icon Cluster -->
<div class="flex items-center justify-center space-x-md">
<div class="w-16 h-16 rounded-full bg-surface-container-highest flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-primary text-3xl icon-fill" data-icon="music_note" data-weight="fill">music_note</span>
</div>
<div class="flex space-x-1">
<div class="w-1 h-1 rounded-full bg-outline-variant"></div>
<div class="w-1 h-1 rounded-full bg-outline-variant"></div>
<div class="w-1 h-1 rounded-full bg-outline-variant"></div>
</div>
<div class="w-16 h-16 rounded-full bg-[#1DB954]/10 flex items-center justify-center shadow-lg border border-[#1DB954]/20">
<!-- Custom Spotify Icon representation using CSS shapes to avoid external assets -->
<div class="relative w-8 h-8 rounded-full bg-[#1DB954] flex items-center justify-center">
<div class="absolute w-5 h-[2px] bg-background rounded-full top-[10px] transform -rotate-6"></div>
<div class="absolute w-6 h-[3px] bg-background rounded-full top-[15px] transform -rotate-6"></div>
<div class="absolute w-4 h-[2px] bg-background rounded-full top-[21px] transform -rotate-6 left-[6px]"></div>
</div>
</div>
</div>
<!-- CTA Button -->
<button class="w-full bg-primary-container hover:bg-primary-container/90 text-on-primary-container font-label-md text-label-md py-4 px-lg rounded-full flex items-center justify-center space-x-sm transition-transform active:scale-95">
<span>Connect Spotify</span>
<span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="font-label-sm text-label-sm text-on-surface-variant/70 text-center">
                        Take Me will never modify your library or post without permission.
                    </p>
</div>
</div>
<!-- Secondary Action -->
<button class="font-label-md text-label-md text-on-surface-variant hover:text-on-surface transition-colors mt-lg py-sm px-md rounded-full hover:bg-surface-container-high active:scale-95">
                Not now
            </button>
</div>
</main>
</body></html>
